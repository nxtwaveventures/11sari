<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold gradient for the pattern -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0E68C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative border pattern -->
  <g fill="url(#goldGradient)" stroke="url(#goldGradient)" stroke-width="1.5">
    <!-- Center decorative element -->
    <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
    <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    
    <!-- Repeated pattern to the left -->
    <g transform="translate(-50, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <g transform="translate(-100, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <g transform="translate(-150, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <!-- Repeated pattern to the right -->
    <g transform="translate(50, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <g transform="translate(100, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <g transform="translate(150, 0)">
      <path d="M200,10 C210,10 220,20 220,30 C220,40 210,50 200,50 C190,50 180,40 180,30 C180,20 190,10 200,10 Z" />
      <circle cx="200" cy="30" r="15" fill="none" stroke-width="2" />
    </g>
    
    <!-- Bottom border design -->
    <path d="M10,60 L390,60" stroke-width="3" />
    <path d="M10,70 L390,70" stroke-width="1.5" />
    
    <!-- Small decorative elements along the border -->
    <g id="decorativeElements">
      <circle cx="30" cy="65" r="3" />
      <circle cx="70" cy="65" r="3" />
      <circle cx="110" cy="65" r="3" />
      <circle cx="150" cy="65" r="3" />
      <circle cx="190" cy="65" r="3" />
      <circle cx="230" cy="65" r="3" />
      <circle cx="270" cy="65" r="3" />
      <circle cx="310" cy="65" r="3" />
      <circle cx="350" cy="65" r="3" />
    </g>
    
    <!-- Bottom hanging design -->
    <g id="hangingElements">
      <path d="M50,70 Q50,85 40,85 Q50,85 50,100" fill="none" />
      <path d="M150,70 Q150,85 140,85 Q150,85 150,100" fill="none" />
      <path d="M250,70 Q250,85 240,85 Q250,85 250,100" fill="none" />
      <path d="M350,70 Q350,85 340,85 Q350,85 350,100" fill="none" />
      
      <path d="M100,70 Q100,85 110,85 Q100,85 100,100" fill="none" />
      <path d="M200,70 Q200,85 210,85 Q200,85 200,100" fill="none" />
      <path d="M300,70 Q300,85 310,85 Q300,85 300,100" fill="none" />
      
      <circle cx="50" cy="100" r="3" />
      <circle cx="150" cy="100" r="3" />
      <circle cx="250" cy="100" r="3" />
      <circle cx="350" cy="100" r="3" />
      
      <circle cx="100" cy="100" r="3" />
      <circle cx="200" cy="100" r="3" />
      <circle cx="300" cy="100" r="3" />
    </g>
  </g>
</svg> 