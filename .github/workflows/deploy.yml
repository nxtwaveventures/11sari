name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm cache clean --force
      
      - name: Enable output export
        run: |
          sed -i 's/\/\/ output: '"'"'export'"'"'/output: '"'"'export'"'"'/g' next.config.js
          cat next.config.js
      
      - name: Build
        run: |
          npm run clean || true
          npm run build
      
      - name: Prepare for deployment
        run: |
          touch out/.nojekyll
          cp public/CNAME out/
          ls -la out
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: 11sari.com
