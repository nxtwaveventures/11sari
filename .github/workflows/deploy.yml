name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.17.0'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Next.js
        run: |
          mkdir -p app/product/[id]
          mkdir -p pages
          touch app/.gitkeep
          touch pages/.gitkeep
      
      - name: Fix structure for Next.js
        run: |
          cp -n utils/sareeData.ts utils/sareeData.ts.bak || true
          mkdir -p utils
          echo 'export interface Saree { id: string; name: string; type: string; price: number; difficulty: number; weaverId: string; origin: string; dyes: string; description: string; model3dUrl: string; images: string[]; }; export const sareeData = { kanch001: { id: "kanch001", name: "Royal Kanjivaram", type: "Kanjivaram", price: 8500, difficulty: 3, weaverId: "WVR78923", origin: "Kanchipuram, Tamil Nadu", dyes: "Natural indigo, turmeric, madder root", description: "A regal Kanjivaram silk saree featuring intricate zari work and a rich purple base with gold motifs.", model3dUrl: "/models/kanch001.glb", images: ["/images/kanch001_1.jpg", "/images/kanch001_2.jpg", "/images/kanch001_3.jpg"] } };' > utils/sareeData.ts
      
      - name: Create basic website files
        run: |
          mkdir -p public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>11sari - Premium Indian Clothing</title><meta name="viewport" content="width=device-width, initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100"><header class="bg-white shadow-md py-4"><div class="container mx-auto px-4"><h1 class="text-3xl font-bold text-blue-600">11sari</h1></div></header><main class="container mx-auto px-4 py-8"><h2 class="text-4xl font-bold mb-4">Premium Indian Clothing</h2><p class="text-lg mb-6">A modern e-commerce platform for traditional Indian clothing, showcasing premium sarees and cultural wear.</p><div class="bg-white rounded-lg shadow-md p-6 mb-6"><h3 class="text-2xl font-semibold mb-4">Featured Collections</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-gray-200 p-4 rounded-lg"><h4 class="font-bold">Royal Kanjivaram</h4><p>Elegance redefined with our premium Kanjivaram collection</p></div><div class="bg-gray-200 p-4 rounded-lg"><h4 class="font-bold">Banarasi Specials</h4><p>Traditional craftsmanship with modern aesthetics</p></div><div class="bg-gray-200 p-4 rounded-lg"><h4 class="font-bold">Chanderi Collection</h4><p>Lightweight comfort with intricate designs</p></div></div></div></main><footer class="bg-gray-800 text-white py-6"><div class="container mx-auto px-4"><p>&copy; 2025 11sari. All rights reserved.</p></div></footer></body></html>' > public/index.html
          echo '11sari.com' > public/CNAME
          touch public/.nojekyll
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: 11sari.com
